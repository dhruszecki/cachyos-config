# Google Workspace apps (Drive / Docs / Sheets / Slides) como PWAs de Brave.
# GLOBAL (todos los usuarios): se carga vía `include /etc/sway/config.d/*` en
# /etc/sway/config. El config principal ya NO define $mod+7..0; acá son el único lugar.
#
# Modelo: cada app tiene su WORKSPACE PROPIO con tag (nombre "N:App", visible en waybar).
#   - `assign` corrala TODAS las ventanas de esa app a su workspace (sin importar si las
#     lanzaste por tecla, fuzzel, o abriendo otro doc desde Drive → caen todas juntas).
#   - El bind hace focus-or-launch: si la app ya está abierta salta a su workspace; si no,
#     la lanza (el assign la ubica). Apretar de nuevo no duplica.
#   - Layout `tabbed` fijo: con varios documentos abiertos quedan en pestañas (el doc activo
#     a pantalla completa). Se cambia en vivo con $mod+e / $mod+w.
#
# Cuenta: las URLs usan /u/0/ = la cuenta default de Google del perfil de Brave de cada
# usuario. Si tu cuenta de trabajo no es la default, cambiá /u/0/ por /u/N/.
#
# OJO: Brave bajo Wayland IGNORA --class; el app_id real lo autogenera de la URL del --app
# (host + path), por eso se matchea por REGEX. Docs/Sheets/Slides comparten host
# (docs.google.com) y se distinguen por el path (__document / __spreadsheets / __presentation).

set $ws_drive  "7:Drive"
set $ws_docs   "8:Docs"
set $ws_sheets "9:Sheets"
set $ws_slides "10:Slides"

# --- Assign: cada PWA a su workspace propio ---
# `number` es CLAVE: matchea el workspace por su NÚMERO (no por nombre exacto). Si ya
# existe un workspace con ese número (ej. un "7" pelado leftover), la app entra ahí en vez
# de crear un "7:Drive" duplicado; si no existe, lo crea con el nombre. Sin `number` se
# duplican los workspaces (un "N" y un "N:Nombre" conviviendo).
assign [app_id="^brave-drive\.google\.com"]              number $ws_drive
assign [app_id="^brave-docs\.google\.com__document"]     number $ws_docs
assign [app_id="^brave-docs\.google\.com__spreadsheets"] number $ws_sheets
assign [app_id="^brave-docs\.google\.com__presentation"] number $ws_slides

# --- Layout tabbed fijo en esos workspaces (se aplica al abrirse cada ventana) ---
for_window [app_id="^brave-drive\.google\.com"]              layout tabbed
for_window [app_id="^brave-docs\.google\.com__document"]     layout tabbed
for_window [app_id="^brave-docs\.google\.com__spreadsheets"] layout tabbed
for_window [app_id="^brave-docs\.google\.com__presentation"] layout tabbed

# --- Binds numéricos: nombran el workspace con su tag. El config principal ya NO define
#     $mod+7..0 (los define acá, único lugar) → sin warning "overwriting binding". ---
bindsym $mod+7 workspace number $ws_drive
bindsym $mod+8 workspace number $ws_docs
bindsym $mod+9 workspace number $ws_sheets
bindsym $mod+0 workspace number $ws_slides
bindsym $mod+Shift+7 move container to workspace number $ws_drive
bindsym $mod+Shift+8 move container to workspace number $ws_docs
bindsym $mod+Shift+9 move container to workspace number $ws_sheets
bindsym $mod+Shift+0 move container to workspace number $ws_slides

# --- Binds de app: focus-or-launch (ir a la app / lanzarla si no existe) ---
# kb: Google Drive
bindsym $mod+Shift+d exec /usr/local/bin/focus-or-launch-app '^brave-drive\.google\.com'              /usr/bin/brave --app=https://drive.google.com/drive/u/0/
# kb: Google Docs
bindsym $mod+Shift+o exec /usr/local/bin/focus-or-launch-app '^brave-docs\.google\.com__document'     /usr/bin/brave --app=https://docs.google.com/document/u/0/
# kb: Google Sheets
bindsym $mod+Shift+t exec /usr/local/bin/focus-or-launch-app '^brave-docs\.google\.com__spreadsheets' /usr/bin/brave --app=https://docs.google.com/spreadsheets/u/0/
# kb: Google Slides
bindsym $mod+Shift+p exec /usr/local/bin/focus-or-launch-app '^brave-docs\.google\.com__presentation' /usr/bin/brave --app=https://docs.google.com/presentation/u/0/
