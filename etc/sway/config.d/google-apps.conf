# Google Workspace apps (Drive / Docs / Sheets / Slides) como PWAs de Brave.
# GLOBAL (todos los usuarios): se carga vía `include /etc/sway/config.d/*` en
# /etc/sway/config.
#
# Modelo: TOGGLE por-app en scratchpad (igual que las apps de trabajo). La misma
# tecla muestra/oculta ESA app puntual (sin cycling, sin tocar otras ventanas).
# La ventana es flotante, grande y centrada. Lo maneja toggle-scratch-app:
# visible->oculta, oculta->muestra, no existe->lanza.
#
# Cuenta: las URLs usan /u/0/ = la cuenta default de Google del perfil de Brave
# de cada usuario (en el perfil de trabajo, tu cuenta corporativa). Si tu cuenta
# de trabajo no es la default, cambiá /u/0/ por /u/N/ (N = índice de la cuenta).
#
# OJO (igual que las apps de trabajo): Brave bajo Wayland IGNORA --class; el app_id real lo
# autogenera de la URL del --app (host + path), por eso se matchea por REGEX.
# Docs/Sheets/Slides comparten host (docs.google.com) y se distinguen por el path.
#   $mod+Shift+d -> Drive    $mod+Shift+o -> Docs
#   $mod+Shift+t -> Sheets   $mod+Shift+p -> Slides (Presentations)

for_window [app_id="^brave-drive\.google\.com"]              move scratchpad, scratchpad show, resize set 1400 900, move position center
for_window [app_id="^brave-docs\.google\.com__document"]     move scratchpad, scratchpad show, resize set 1400 900, move position center
for_window [app_id="^brave-docs\.google\.com__spreadsheets"] move scratchpad, scratchpad show, resize set 1400 900, move position center
for_window [app_id="^brave-docs\.google\.com__presentation"] move scratchpad, scratchpad show, resize set 1400 900, move position center

# kb: Google Drive
bindsym $mod+Shift+d exec /usr/local/bin/toggle-scratch-app '^brave-drive\.google\.com'              /usr/bin/brave --app=https://drive.google.com/drive/u/0/
# kb: Google Docs
bindsym $mod+Shift+o exec /usr/local/bin/toggle-scratch-app '^brave-docs\.google\.com__document'     /usr/bin/brave --app=https://docs.google.com/document/u/0/
# kb: Google Sheets
bindsym $mod+Shift+t exec /usr/local/bin/toggle-scratch-app '^brave-docs\.google\.com__spreadsheets' /usr/bin/brave --app=https://docs.google.com/spreadsheets/u/0/
# kb: Google Slides
bindsym $mod+Shift+p exec /usr/local/bin/toggle-scratch-app '^brave-docs\.google\.com__presentation' /usr/bin/brave --app=https://docs.google.com/presentation/u/0/
