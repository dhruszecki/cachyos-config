# Keybindings personales (solo daro).
# Incluido desde /etc/sway/config vía `include ~/.config/sway/config.d/*.conf`.
# El config principal ya NO define $mod+6 (lo definen por-usuario para no chocar con el
# override de Meet de daro-m → evita el warning "overwriting binding Mod4+6"). Acá daro
# recupera su workspace 6 normal, sin tag.
bindsym $mod+6 workspace number 6
bindsym $mod+Shift+6 move container to workspace number 6
