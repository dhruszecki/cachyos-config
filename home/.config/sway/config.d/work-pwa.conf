# Reglas/keybindings de apps de trabajo (solo daro-m).
# Incluido desde /etc/sway/config vía `include ~/.config/sway/config.d/*.conf`.
# Las PWAs son brave --app. OJO: Brave bajo Wayland IGNORA --class; el app_id real es
# autogenerado de la URL ("brave-<host>...-Default"), por eso se matchea por REGEX del host.

# NOTA: Brave bajo Wayland IGNORA --class; el app_id real es autogenerado de la URL del
# --app ("brave-<host>...-Default"), por eso todo se matchea por REGEX del host.

# --- Meet: workspace propio 6 con tag (no flotante) ---
# Pisa el bind global $mod+6 para nombrar el workspace "6:Meet" (visible en waybar).
# Bind de app = focus-or-launch (ir a Meet / lanzarlo si no existe, sin duplicar).
set $ws_meet "6:Meet"
# `number` evita el workspace duplicado ("6" pelado + "6:Meet"): matchea por número.
assign [app_id="^brave-meet\.google\.com"] number $ws_meet
for_window [app_id="^brave-meet\.google\.com"] layout tabbed
bindsym $mod+6 workspace number $ws_meet
bindsym $mod+Shift+6 move container to workspace number $ws_meet
# kb: Google Meet
bindsym $mod+Shift+g exec /usr/local/bin/focus-or-launch-app '^brave-meet\.google\.com' /usr/bin/brave --app=https://meet.google.com/

# --- Scratchpad flotante (toggle mostrar/ocultar/lanzar con su keybind) ---
#   $mod+Shift+m -> Slack        $mod+Shift+w -> WhatsApp
#   $mod+Shift+a -> Calendar     $mod+Shift+i -> Gmail   (ambos de trabajo)
for_window [app_id="^brave-app\.slack\.com"]       move scratchpad, scratchpad show, resize set 1100 780, move position center
for_window [app_id="^brave-web\.whatsapp\.com"]    move scratchpad, scratchpad show, resize set 1100 780, move position center
for_window [app_id="^brave-calendar\.google\.com"] move scratchpad, scratchpad show, resize set 1100 780, move position center
for_window [app_id="^brave-mail\.google\.com"]     move scratchpad, scratchpad show, resize set 1100 780, move position center
# kb: Slack
bindsym $mod+Shift+m exec /usr/local/bin/toggle-scratch-app '^brave-app\.slack\.com'       /usr/bin/brave --app=https://app.slack.com/client/
# kb: WhatsApp
bindsym $mod+Shift+w exec /usr/local/bin/toggle-scratch-app '^brave-web\.whatsapp\.com'    /usr/bin/brave --app=https://web.whatsapp.com/
# kb: Calendar (trabajo)
bindsym $mod+Shift+a exec /usr/local/bin/toggle-scratch-app '^brave-calendar\.google\.com' /usr/bin/brave --app=https://calendar.google.com/
# kb: Gmail (trabajo)
bindsym $mod+Shift+i exec /usr/local/bin/toggle-scratch-app '^brave-mail\.google\.com'     /usr/bin/brave --app=https://mail.google.com/
